# GCE VM / yerel: Next+Python tek imaj
#   docker compose up --build -d
# Arayüz: http://localhost:3000  (konteyner 8080, eşleme 3000:8080)
services:
  yorunge:
    build:
      context: .
      target: runtime
    image: yorunge-muhafizi:local
    ports:
      - "3000:8080"
    environment:
      PORT: "8080"
    restart: unless-stopped
