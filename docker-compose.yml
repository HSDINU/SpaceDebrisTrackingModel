# Compose spec (version anahtarı gerekmez — Compose V2)
# ── Yerel geliştirme ─────────────────────────────────────────────────────────
# Cloud Run deploy: .\deploy-gcloud.ps1 veya ./deploy-gcloud.sh
# Image tam adı: ${REGION}-docker.pkg.dev/${PROJECT_ID}/yorunge-repo/yorunge-muhafizi:latest
#   REGION / PROJECT_ID → deploy-gcloud.* içindeki değerlerle aynı olmalı

services:
  yorunge-muhafizi:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    # Yerel: yorunge-muhafizi:latest | Artifact Registry: deploy betiğindeki FULL_IMAGE
    image: yorunge-muhafizi:latest
    container_name: yorunge_muhafizi
    ports:
      - "8501:8501"
    volumes:
      # Pipeline çıktılarını (data/) ve modeli container'a bağla.
      # Bu sayede `python main.py --all` sonrası uygulama güncel veriye erişir.
      - ./data:/app/data:ro
      - ./lightgbm_risk_modeli.pkl:/app/lightgbm_risk_modeli.pkl:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # İsteğe bağlı: tam pipeline (main.py --all) — runtime imajı gerekir (kaynak + ml_pipeline)
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: yorunge-pipeline:latest
    container_name: yorunge_pipeline
    volumes:
      - ./data:/app/data
      - ./lightgbm_risk_modeli.pkl:/app/lightgbm_risk_modeli.pkl
      - ./cop_verileri.json:/app/cop_verileri.json:ro
      - ./turk_uydulari.json:/app/turk_uydulari.json:ro
    command: ["python", "main.py", "--all"]
    profiles:
      - pipeline
