version: "3.9"

services:
  celestial-sentinel:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: celestial-sentinel:latest
    container_name: celestial_sentinel
    ports:
      - "8501:8501"
    volumes:
      # Pipeline çıktılarını (data/) ve modeli container'a bağla.
      # Bu sayede `python main.py --all` sonrası uygulama güncel veriye erişir.
      - ./data:/app/data:ro
      - ./lightgbm_risk_modeli.pkl:/app/lightgbm_risk_modeli.pkl:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # İsteğe bağlı: pipeline'ı container içinde çalıştırmak için
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: celestial-pipeline:latest
    container_name: celestial_pipeline
    volumes:
      - ./data:/app/data
      - ./lightgbm_risk_modeli.pkl:/app/lightgbm_risk_modeli.pkl
      - ./cop_verileri.json:/app/cop_verileri.json:ro
      - ./turk_uydulari.json:/app/turk_uydulari.json:ro
    command: ["python", "main.py", "--all"]
    profiles:
      - pipeline
